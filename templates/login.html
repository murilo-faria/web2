<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Login - HelpDesk</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<main class="container">

    <div class="card">

        <h1>HelpDesk TI</h1>

        <p style="text-align:center;">
            Faça login para acessar o sistema.
        </p>

        {% if erro %}

            <p style="color:red; text-align:center;">
                {{ erro }}
            </p>

        {% endif %}

        <form method="POST">

            <label>Usuário</label>

            <input
                type="text"
                name="usuario"
                required>

            <label>Senha</label>

            <input
                type="password"
                name="senha"
                required>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</main>

</body>

</html>
